<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คิวว่าง – คลินิกหมอฐิติ</title>

  <!-- Google Fonts: Sarabun (Thai + Latin) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===========================
       CSS Variables – Brand Palette
       =========================== */
    :root {
      --bg:            #f5f7f5;
      --surface:       #ffffff;
      --surface-alt:   #eef4f0;
      --brand:         #3a7d6e;
      --brand-light:   #6aad9b;
      --brand-muted:   #c7dfd9;
      --brand-subtle:  #e6f2ef;
      --accent:        #2a6259;
      --text-dark:     #2d3a35;
      --text-mid:      #5a6e68;
      --text-light:    #8fa89f;
      --line-green:    #06c755;
      --border:        #d5e6e0;
      --shadow-sm:     0 2px 8px rgba(58,125,110,.07);
      --shadow-md:     0 4px 20px rgba(58,125,110,.11);
      --shadow-lg:     0 8px 32px rgba(58,125,110,.14);
      --radius-sm:     8px;
      --radius-md:     14px;
      --radius-lg:     20px;
      --font:          'Sarabun', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===========================
       Page wrapper
       =========================== */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ===========================
       HEADER
       =========================== */
    .header {
      text-align: center;
      padding: 48px 20px 28px;
    }

    /*
      Logo container – เปลี่ยนโลโก้จริงภายหลัง:
      1. ลบ <div class="logo-placeholder"> ออก
      2. ใส่ <img src="YOUR_LOGO.png" alt="คลินิกหมอฐิติ" style="height:88px;" /> แทน
    */
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo-placeholder {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-light), var(--brand));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-align: center;
      line-height: 1.5;
      padding: 10px;
      box-shadow: var(--shadow-md);
    }

    .logo-placeholder .logo-icon { font-size: 24px; margin-bottom: 4px; }

    .clinic-name {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--brand);
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .page-title {
      font-size: clamp(1.05rem, 3vw, 1.35rem);
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 0.88rem;
      color: var(--text-mid);
    }

    /* ===========================
       Meta bar
       =========================== */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 22px 0 6px;
    }

    .badge-updated {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 16px;
      font-size: 0.82rem;
      color: var(--text-mid);
      box-shadow: var(--shadow-sm);
    }

    .badge-updated .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--brand-light);
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.75); }
    }

    /* ===========================
       LINE CTA
       =========================== */
    .line-cta-wrap {
      text-align: center;
      margin: 0 0 36px;
    }

    /*
      LINE OA – เปลี่ยน href ด้านล่างเป็นลิงก์ LINE OA จริงของคลินิก
      Placeholder: https://lin.ee/yZUISVTd
    */
    .btn-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--line-green);
      color: #fff;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      padding: 13px 30px;
      border-radius: 999px;
      box-shadow: 0 4px 16px rgba(6,199,85,.28);
      transition: transform .18s, box-shadow .18s, background .18s;
    }

    .btn-line:hover {
      background: #05b34d;
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(6,199,85,.38);
    }

    /* ===========================
       Refresh button
       =========================== */
    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--brand);
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 7px 18px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: background .15s, box-shadow .15s, transform .15s;
    }

    .btn-refresh:hover {
      background: var(--surface-alt);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .btn-refresh.spinning .ri { animation: spin .7s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===========================
       Week grid
       =========================== */
    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
      margin-bottom: 40px;
    }

    /* ===========================
       Day card
       =========================== */
    .day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 12px 18px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 145px;
      animation: fadeUp .4s ease both;
      transition: box-shadow .2s;
    }

    .day-card:hover { box-shadow: var(--shadow-md); }

    .day-card.has-slots {
      border-color: var(--brand-muted);
      background: var(--brand-subtle);
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .day-card:nth-child(1) { animation-delay:.05s; }
    .day-card:nth-child(2) { animation-delay:.10s; }
    .day-card:nth-child(3) { animation-delay:.15s; }
    .day-card:nth-child(4) { animation-delay:.20s; }
    .day-card:nth-child(5) { animation-delay:.25s; }
    .day-card:nth-child(6) { animation-delay:.30s; }
    .day-card:nth-child(7) { animation-delay:.35s; }

    .day-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--brand);
      text-align: center;
    }

    .day-date {
      font-size: 0.73rem;
      color: var(--text-light);
      text-align: center;
      margin-top: -4px;
    }

    .divider-line {
      width: 30px; height: 1.5px;
      background: var(--brand-muted);
      border-radius: 2px;
      margin: 2px auto;
    }

    .slots-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
    }

    .slot-box {
      background: var(--brand-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 6px;
      text-align: center;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent);
      box-shadow: 0 1px 4px rgba(58,125,110,.07);
      cursor: default;
      transition: background .15s, transform .15s, box-shadow .15s;
    }

    .slot-box:hover {
      background: var(--brand-light);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(58,125,110,.18);
    }

    .no-slot-text {
      font-size: 0.78rem;
      color: var(--text-light);
      text-align: center;
      margin-top: 6px;
      line-height: 1.7;
    }

    /* ===========================
       Loading / Error
       =========================== */
    .state-box {
      text-align: center;
      padding: 64px 20px;
      color: var(--text-mid);
    }

    .state-icon { font-size: 2.5rem; margin-bottom: 14px; }

    .spinner-ring {
      width: 46px; height: 46px;
      border: 3px solid var(--brand-muted);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 18px;
    }

    .state-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-dark);
    }

    .state-sub { font-size: 0.87rem; color: var(--text-light); }

    /* ===========================
       Footer
       =========================== */
    .footer {
      text-align: center;
      padding: 28px 20px 12px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }

    .footer p {
      font-size: 0.85rem;
      color: var(--text-mid);
      line-height: 1.9;
    }

    .footer .hl { color: var(--brand); font-weight: 600; }

    /* ===========================
       Responsive
       =========================== */
    @media (max-width: 860px) {
      .week-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 560px) {
      .week-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .day-card  { min-height: 120px; padding: 14px 10px 16px; }
      .day-name  { font-size: 1rem; }
      .slot-box  { font-size: 0.9rem; padding: 8px; }
      .header    { padding: 32px 12px 22px; }
    }
  </style>
</head>

<script>
  /* ===================================
     CONFIG
     =================================== */
  const API_URL    = 'https://script.google.com/macros/s/AKfycbylyIMd9qn1Jeo70_xC7-bpuKETcoGBAh9syC_CO2rX4BmADeDqev1IS0aKbFCXtWtnsg/exec';
  const REFRESH_MS = 60_000; // auto-refresh ทุก 60 วินาที

  // ลำดับคอลัมน์: อาทิตย์ → เสาร์
  const DAY_ORDER = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];

  /* ===================================
     Helpers
     =================================== */
  function formatUpdated(iso) {
    try {
      const d = new Date(iso);
      const p = n => String(n).padStart(2,'0');
      return `อัปเดต ${p(d.getHours())}:${p(d.getMinutes())} น.`;
    } catch { return 'อัปเดตล่าสุด'; }
  }

  /* ===================================
     Build 7-column grid
     =================================== */
  // Fixed time slots shown every Saturday and Sunday (independent of API)
  // แก้ไขช่วงเวลาและ interval ได้ที่นี่
  const WEEKEND_START    = '08:30';
  const WEEKEND_END      = '11:30';
  const WEEKEND_INTERVAL = 30; // นาที

  function generateWeekendSlots() {
    const slots = [];
    const [sh, sm] = WEEKEND_START.split(':').map(Number);
    const [eh, em] = WEEKEND_END.split(':').map(Number);
    let cur = sh * 60 + sm;
    const end = eh * 60 + em;
    while (cur <= end) {
      const h = String(Math.floor(cur / 60)).padStart(2, '0');
      const m = String(cur % 60).padStart(2, '0');
      slots.push(`${h}:${m}`);
      cur += WEEKEND_INTERVAL;
    }
    return slots;
  }

  const WEEKEND_SLOTS = generateWeekendSlots();
  const WEEKEND_DAYS  = ['เสาร์', 'อาทิตย์'];

  function buildGrid(slots) {
    // Group by day name
    const byDay = {};
    for (const s of slots) {
      if (!byDay[s.day]) byDay[s.day] = { date_display: s.date_display, times: [] };
      byDay[s.day].times.push(s.time);
    }
    // Sort times numerically (prevents "10:00" sorting before "08:30")
    for (const k in byDay) {
      byDay[k].times.sort((a, b) => {
        const [ah, am] = a.split(':').map(Number);
        const [bh, bm] = b.split(':').map(Number);
        return (ah * 60 + am) - (bh * 60 + bm);
      });
    }

    const grid = document.createElement('div');
    grid.className = 'week-grid';

    for (const dayName of DAY_ORDER) {
      const card = document.createElement('div');
      card.className = 'day-card';

      // วันเสาร์/อาทิตย์: ใช้ข้อมูลจาก API ถ้ามี, fallback เป็น fixed slots ถ้าไม่มี
      if (WEEKEND_DAYS.includes(dayName) && !byDay[dayName]) {
        card.classList.add('has-slots');
        card.innerHTML = `
          <div class="day-name">${dayName}</div>
          <div class="divider-line"></div>
          <div class="slots-wrap">
            ${WEEKEND_SLOTS.map(t => `<div class="slot-box">${t}</div>`).join('')}
          </div>`;
      } else if (byDay[dayName]) {
        card.classList.add('has-slots');
        const { date_display, times } = byDay[dayName];
        card.innerHTML = `
          <div class="day-name">${dayName}</div>
          <div class="day-date">${date_display}</div>
          <div class="divider-line"></div>
          <div class="slots-wrap">
            ${times.map(t => `<div class="slot-box">${t}</div>`).join('')}
          </div>`;
      } else {
        card.innerHTML = `
          <div class="day-name">${dayName}</div>
          <div class="divider-line"></div>
          <div class="no-slot-text">ไม่มีคิวว่าง</div>`;
      }

      grid.appendChild(card);
    }
    return grid;
  }

  /* ===================================
     State renderers
     =================================== */
  function showLoading() {
    document.getElementById('content-area').innerHTML = `
      <div class="state-box">
        <div class="spinner-ring"></div>
        <div class="state-title">กำลังโหลดข้อมูลคิวว่าง…</div>
        <div class="state-sub">กรุณารอสักครู่</div>
      </div>`;
    
    document.getElementById('updated-label').textContent = 'กำลังโหลด…';
  }

  function showError(msg) {
    document.getElementById('content-area').innerHTML = `
      <div class="state-box">
        <div class="state-icon">🔌</div>
        <div class="state-title">ไม่สามารถโหลดข้อมูลได้</div>
        <div class="state-sub">${msg}</div>
      </div>`;
    document.getElementById('updated-label').textContent = 'โหลดไม่สำเร็จ';
    // total-count removed
  }

  /* ===================================
     Main fetch
     =================================== */
  async function loadQueue() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');

    try {
      const res  = await fetch(API_URL);
      const json = await res.json();

      if (!json.success) {
        showError('ระบบแจ้งว่าข้อมูลไม่พร้อมในขณะนี้ กรุณาลองใหม่อีกครั้ง');
        return;
      }

      const slots = Array.isArray(json.data) ? json.data : [];

      // เก็บเฉพาะ 7 วันแรกตามลำดับวันที่
      const uniqDates = [...new Set(slots.map(s => s.date_real))].sort().slice(0,7);
      const filtered  = slots.filter(s => uniqDates.includes(s.date_real));

      // total-count removed
      document.getElementById('updated-label').textContent = formatUpdated(json.updated_at);

      const area = document.getElementById('content-area');
      area.innerHTML = '';

      if (filtered.length === 0) {
        area.innerHTML = `
          <div class="state-box">
            <div class="state-icon">📅</div>
            <div class="state-title">ไม่มีคิวว่างในขณะนี้</div>
            <div class="state-sub">กรุณาติดต่อคลินิกเพื่อสอบถามเพิ่มเติม</div>
          </div>`;
      } else {
        area.appendChild(buildGrid(filtered));
      }

    } catch (err) {
      showError('เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองอีกครั้ง');
      console.error('Queue fetch error:', err);
    } finally {
      btn.classList.remove('spinning');
    }
  }

  /* ===================================
     Init – โหลดทันที + auto-refresh
     =================================== */
  loadQueue();
  setInterval(loadQueue, REFRESH_MS);
</script>

</body>
</html>
